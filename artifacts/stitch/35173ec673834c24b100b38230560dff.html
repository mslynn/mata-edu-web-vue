<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=1920, height=1200" name="viewport"/>
<title>AI智慧教育平台 - 人脸数据采集及录入</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { 
            font-family: 'Plus Jakarta Sans', 'PingFang SC', sans-serif; 
            width: 1920px;
            height: 1200px;
            overflow: hidden;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        .mode-card:hover { transform: translateY(-4px); }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#abb3b9",
                    "primary-fixed-dim": "#3e66f0",
                    "surface-container-low": "#f0f4f8",
                    "tertiary-dim": "#834100",
                    "secondary": "#006b60",
                    "tertiary": "#954b00",
                    "surface-container": "#e9eef3",
                    "secondary-container": "#62fae3",
                    "surface-tint": "#2451dc",
                    "on-tertiary": "#fff7f4",
                    "secondary-fixed-dim": "#50ebd5",
                    "error": "#a8364b",
                    "on-tertiary-fixed-variant": "#592b00",
                    "on-secondary": "#e2fff8",
                    "surface-container-highest": "#dce3e9",
                    "tertiary-container": "#fd933d",
                    "outline": "#747c81",
                    "on-secondary-fixed-variant": "#00675c",
                    "on-tertiary-container": "#4c2300",
                    "inverse-surface": "#0b0f11",
                    "on-tertiary-fixed": "#250e00",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#fff7f7",
                    "primary-dim": "#0c43cf",
                    "primary-container": "#4d73fd",
                    "on-background": "#2c3338",
                    "surface-container-high": "#e3e9ee",
                    "inverse-primary": "#6a89ff",
                    "error-dim": "#6b0221",
                    "on-primary-container": "#000000",
                    "background": "#f7f9fc",
                    "surface-dim": "#d4dbe1",
                    "tertiary-fixed-dim": "#ec8731",
                    "on-primary": "#faf8ff",
                    "secondary-dim": "#005e54",
                    "primary": "#2451dc",
                    "on-primary-fixed-variant": "#f9f7ff",
                    "on-surface-variant": "#596065",
                    "surface": "#f7f9fc",
                    "on-surface": "#2c3338",
                    "primary-fixed": "#4d73fd",
                    "on-error-container": "#6e0523",
                    "error-container": "#f97386",
                    "tertiary-fixed": "#fd933d",
                    "on-primary-fixed": "#ffffff",
                    "on-secondary-container": "#005c52",
                    "on-secondary-fixed": "#004840",
                    "surface-bright": "#f7f9fc",
                    "surface-variant": "#dce3e9",
                    "secondary-fixed": "#62fae3",
                    "inverse-on-surface": "#9a9da0"
            }
          }
        }
      }
    </script>
</head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-[1920px] z-50 bg-white/80 backdrop-blur-md shadow-sm flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-8">
<span class="text-xl font-bold text-slate-800">AI智慧教育平台</span>
<nav class="flex gap-6">
<a class="text-blue-600 font-semibold text-sm" href="#">数据采集</a>
<a class="text-slate-500 hover:text-slate-700 text-sm transition-colors" href="#">学生管理</a>
<a class="text-slate-500 hover:text-slate-700 text-sm transition-colors" href="#">采集统计</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100 rounded-full text-slate-600">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 hover:bg-slate-100 rounded-full text-slate-600">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-white overflow-hidden ml-2">
<img alt="用户头像" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKIOFLLP1AzPYYMyl7FZKuldpMfkP8BnK8wejPcAc_Ot5GhunDvF5RO7TmhtAj7IjZmHK9ljeneuCyKrPE4MhSi_iVpYwhV7BeSnXgEMw7umy28_jnb9ONmeSatHv9EIX7KkxcP_pN5IP7dpVP4a3PPZdDIMXxUI4z2nl8wzxzuiB-RGqrQFD9k50_IydBokWDeN6aacUqZZPzyXOVVjz0ZB-I_Eb4mm-b0hTt_6IUVcAY9QnsJbKzRpvv0bhijHcKd0LHoXUVaw"/>
</div>
</div>
</header>
<!-- SideNavBar -->
<aside class="fixed left-0 top-0 flex flex-col pt-20 pb-6 h-full w-64 bg-white border-r border-surface-variant/30 z-40">
<div class="px-6 mb-8">
<h2 class="text-lg font-bold text-slate-900">教育管理者</h2>
<p class="text-xs text-on-surface-variant">智慧校园控制台</p>
</div>
<nav class="flex-1 space-y-1">
<a class="bg-blue-50 text-blue-600 border-l-4 border-blue-600 px-4 py-3 flex items-center gap-3 transition-all duration-200" href="#">
<span class="material-symbols-outlined">face</span>
<span class="text-sm font-medium">数据采集</span>
</a>
<a class="text-slate-500 px-4 py-3 flex items-center gap-3 hover:bg-slate-50 transition-all duration-200" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-sm">学生管理</span>
</a>
<a class="text-slate-500 px-4 py-3 flex items-center gap-3 hover:bg-slate-50 transition-all duration-200" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-sm">采集统计</span>
</a>
<a class="text-slate-500 px-4 py-3 flex items-center gap-3 hover:bg-slate-50 transition-all duration-200" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-sm">系统设置</span>
</a>
</nav>
<div class="px-4 mt-auto">
<button class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-lg transition-all">
<span class="material-symbols-outlined">logout</span>
<span class="text-sm">退出登录</span>
</button>
</div>
</aside>
<!-- Main Canvas -->
<main class="ml-64 pt-24 p-12 h-full flex flex-col">
<div class="max-w-[1580px] mx-auto w-full flex-1 flex flex-col">
<!-- Header Section -->
<div class="mb-10">
<h1 class="text-[2.75rem] font-bold text-on-surface leading-tight">人脸数据采集及录入</h1>
<p class="text-on-surface-variant mt-2 text-lg">通过上传图片或开启摄像头快速完成人脸身份登记</p>
</div>
<!-- Experience Area -->
<div class="grid grid-cols-12 gap-10 flex-1 items-stretch">
<!-- Dual-Mode Display Area (Capture area on the left) -->
<div class="col-span-8 flex flex-col">
<div class="bg-surface-container-low rounded-[2rem] p-12 flex-1 flex flex-col items-center justify-center relative overflow-hidden">
<div class="grid grid-cols-2 gap-10 w-full max-w-4xl">
<!-- Upload Option -->
<button class="mode-card group bg-surface-container-lowest p-12 rounded-[2.5rem] border-2 border-dashed border-outline-variant/30 hover:border-primary hover:bg-primary/5 transition-all duration-300 flex flex-col items-center gap-6">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'opsz' 48;">upload_file</span>
</div>
<div class="text-center">
<h3 class="text-2xl font-bold text-on-surface">上传本地图片</h3>
<p class="text-base text-on-surface-variant mt-3 leading-relaxed">支持 JPG, PNG 格式<br/>可批量选择多张照片</p>
</div>
</button>
<!-- Camera Option -->
<button class="mode-card group bg-surface-container-lowest p-12 rounded-[2.5rem] border-2 border-dashed border-outline-variant/30 hover:border-secondary hover:bg-secondary/5 transition-all duration-300 flex flex-col items-center gap-6">
<div class="w-24 h-24 bg-secondary/10 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'opsz' 48;">photo_camera</span>
</div>
<div class="text-center">
<h3 class="text-2xl font-bold text-on-surface">开启摄像头</h3>
<p class="text-base text-on-surface-variant mt-3 leading-relaxed">实时视频捕获<br/>AI自动提取面部特征</p>
</div>
</button>
</div>
</div>
<!-- Action Button below capture box -->
<div class="mt-10 flex justify-center">
<button class="w-full max-w-4xl bg-gradient-to-br from-primary to-primary-container text-white py-5 rounded-2xl font-bold text-xl transition-all hover:shadow-2xl hover:shadow-primary/30 transform active:scale-[0.98]">
                        录入人脸信息
                    </button>
</div>
</div>
<!-- Interaction Panel (Input form on the right) -->
<div class="col-span-4 flex flex-col gap-8">
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-10 shadow-sm border border-outline-variant/10">
<div class="flex items-center gap-4 mb-10">
<div class="w-14 h-14 bg-primary-container/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<h3 class="text-2xl font-bold text-on-surface">身份标记</h3>
<p class="text-base text-on-surface-variant">请完善目标姓名信息</p>
</div>
</div>
<div class="space-y-8">
<div>
<label class="block text-base font-bold text-on-surface mb-3">姓名</label>
<input class="w-full bg-surface-container-highest border-none rounded-2xl px-5 py-4 text-lg focus:ring-2 focus:ring-primary/30 transition-all" placeholder="请输入学生或人员姓名" type="text"/>
</div>
</div>
</div>
<!-- Recognition List -->
<div class="bg-surface-container-low rounded-[2rem] p-8 flex-1">
<h4 class="text-sm font-bold text-on-surface-variant uppercase tracking-widest mb-6">已录入人脸信息</h4>
<div class="space-y-4">
<div class="flex items-center gap-4 p-5 bg-surface-container-lowest rounded-2xl border border-outline-variant/5">
<div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant/40 text-2xl">person</span>
</div>
<div class="flex-1">
<p class="text-base font-bold text-on-surface">未命名目标 01</p>
<p class="text-xs text-on-surface-variant mt-1">等待输入姓名...</p>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-primary hover:bg-primary/10 transition-colors" title="重新录入">
<span class="material-symbols-outlined text-[22px]">edit_square</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-error hover:bg-error/10 transition-colors" title="删除">
<span class="material-symbols-outlined text-[22px]">delete</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Collection Tips Box at the bottom -->
<div class="mt-12">
<div class="bg-primary/5 p-8 rounded-[2rem] border border-primary/10">
<h5 class="text-primary font-bold text-lg mb-2 flex items-center gap-2">
<span class="material-symbols-outlined">info</span>
                    采集提示
                </h5>
<p class="text-base text-on-surface-variant">建议在光线柔和的环境下采集，人脸正对镜头可获得更精准的特征提取。系统将自动过滤模糊影像。</p>
</div>
</div>
</div>
</main>
</body></html>
